services:
  backend:
    build:
      context: ./backend
    container_name: hype-news-hub-backend
    restart: unless-stopped
    environment:
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - hype-news-hub

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: hype-news-hub-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); http.get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - hype-news-hub

networks:
  hype-news-hub:
    driver: bridge